name            = "stl-music"
main            = "src/worker.js"
compatibility_date = "2026-06-13"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = "public"
binding = "ASSETS"

[[kv_namespaces]]
binding = "MUSIC_KV"
id = "029e3ba66a3743bbaf4a2fef5992aae9"

# Cron trigger removed — add manually in CF dashboard under:
# Workers & Pages → stl-music → Settings → Trigger events → Add
# Schedule: 0 11 * * 2  (every Tuesday 11:00 UTC / 6am CT)
# Free tier limit is 5 cron triggers across all workers
